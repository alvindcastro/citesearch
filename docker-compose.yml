services:

  # ── RAG Backend ──────────────────────────────────────────────────────────────
  # Builds from Dockerfile (full image: Swagger, Azure deps).
  # Needs all AZURE_* vars from .env.
  http:
    build: .
    image: citesearch
    command: ["./citesearch-http"]
    ports:
      - "${CITESEARCH_HTTP_PORT:-9080}:9080"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9080/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped

  # gRPC interface (same binary set, different command).
  # Optional — omit if you only need the HTTP API.
  grpc:
    image: citesearch
    command: ["./citesearch-grpc"]
    ports:
      - "${CITESEARCH_GRPC_PORT:-9083}:9083"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      http:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── Botpress Adapter ─────────────────────────────────────────────────────────
  # Builds from Dockerfile.adapter (lean ~15 MB image, no Azure deps).
  # Talks to the backend over Docker's internal network — no ngrok for the backend.
  adapter:
    build:
      context: .
      dockerfile: Dockerfile.adapter
    image: ask-banner-adapter
    ports:
      - "${CHATBOT_ADAPTER_PORT:-9082}:9082"
    environment:
      PORT: "9082"
      RAG_BACKEND_URL: http://http:9080   # Docker service DNS — no ngrok needed here
    depends_on:
      http:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9082/health"]
      interval: 15s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

  # ── ngrok tunnel ─────────────────────────────────────────────────────────────
  # Exposes the adapter (port 9082) to Botpress Cloud via a public HTTPS URL.
  # Requires NGROK_AUTHTOKEN in .env.
  # After startup, get the public URL:
  #   curl -s http://localhost:9404/api/tunnels | jq -r '.tunnels[0].public_url'
  # Set that URL as RAG_ADAPTER_URL in Botpress Cloud → Configuration → Environment Variables.
  ngrok:
    image: ngrok/ngrok:latest
    command: http adapter:9082 --log stdout
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - "${NGROK_WEB_PORT:-9404}:4040"   # ngrok inspector / web UI
    depends_on:
      adapter:
        condition: service_healthy
    restart: unless-stopped
